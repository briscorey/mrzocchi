<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#243660"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#40B4A6"/>
      <stop offset="100%" stop-color="#2A9D8F"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2D68A"/>
      <stop offset="100%" stop-color="#E9C46A"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  
  <!-- Subtle inner ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  
  <!-- Electron orbits (Science) -->
  <ellipse cx="100" cy="100" rx="58" ry="22" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" opacity="0.8" transform="rotate(-30 100 100)"/>
  <ellipse cx="100" cy="100" rx="58" ry="22" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" opacity="0.8" transform="rotate(30 100 100)"/>
  <ellipse cx="100" cy="100" rx="58" ry="22" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" opacity="0.8" transform="rotate(90 100 100)"/>
  
  <!-- Nucleus / Central node -->
  <circle cx="100" cy="100" r="14" fill="url(#goldGrad)"/>
  <circle cx="100" cy="100" r="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- Electron dots on orbits -->
  <circle cx="145" cy="74" r="5" fill="url(#tealGrad)"/>
  <circle cx="145" cy="74" r="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  
  <circle cx="55" cy="126" r="5" fill="url(#tealGrad)"/>
  <circle cx="55" cy="126" r="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  
  <circle cx="100" cy="42" r="5" fill="url(#tealGrad)"/>
  <circle cx="100" cy="42" r="5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  
  <!-- Pi symbol inside nucleus (Maths) -->
  <text x="100" y="107" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#1B2A4A" text-anchor="middle" dominant-baseline="middle">π</text>
  
  <!-- Subtle MZ monogram at bottom -->
  <text x="100" y="176" font-family="'DM Sans', sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="3">MZ</text>
</svg>
