<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🌿 Grade 8 Ecology Review</title>
<style>
:root {
  --grade: #1B2A4A;
  --navy: #1B2A4A;
  --cream: #FAF8F5;
  --white: #FFFFFF;
  --gray-100: #F3F1EE;
  --gray-200: #E5E2DC;
  --gray-400: #9B9690;
  --gray-600: #6B6660;
  --gray-800: #3D3A36;
  --gold: #E9C46A;
  --green: #10B981;
  --red: #EF4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--gray-800); min-height:100vh; padding:20px; }

.game-wrap { max-width:680px; margin:0 auto; }

/* Header */
.game-header { text-align:center; margin-bottom:20px; }
.game-title { font-family:'Fraunces',serif; font-size:1.4rem; font-weight:700; color:var(--navy); margin-bottom:4px; }
.game-subtitle { font-size:0.82rem; color:var(--gray-400); }

/* Progress */
.progress-wrap { margin-bottom:20px; }
.progress-bar { height:8px; background:var(--gray-200); border-radius:4px; overflow:hidden; margin-bottom:6px; }
.progress-fill { height:100%; background:linear-gradient(90deg, var(--grade), var(--gold)); border-radius:4px; transition:width 0.5s cubic-bezier(0.22,1,0.36,1); width:0%; }
.progress-text { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--gray-400); }
.score-display { font-weight:700; }
.score-display .correct { color:var(--green); }
.score-display .wrong { color:var(--red); }

/* Question card */
.q-card {
  background:var(--white); border-radius:18px; padding:28px;
  border:1.5px solid var(--gray-200); box-shadow:0 1px 4px rgba(27,42,74,0.04);
  margin-bottom:16px; animation:fadeIn 0.35s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.q-num { font-family:'Fraunces',serif; font-size:0.72rem; font-weight:700; color:var(--grade); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.q-text { font-family:'Fraunces',serif; font-size:1.12rem; font-weight:600; color:var(--navy); line-height:1.5; margin-bottom:20px; }

/* Options */
.options { display:flex; flex-direction:column; gap:10px; }
.opt-btn {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px; border-radius:14px;
  border:1.5px solid var(--gray-200); background:var(--white);
  font-family:'DM Sans',sans-serif; font-size:0.92rem;
  color:var(--gray-800); cursor:pointer; transition:all 0.2s;
  text-align:left; width:100%;
}
.opt-btn:hover:not(.locked) { border-color:var(--grade); background:rgba(42,157,143,0.04); transform:translateX(4px); }
.opt-letter {
  width:30px; height:30px; border-radius:10px;
  background:var(--gray-100); display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:0.82rem; color:var(--gray-600); flex-shrink:0;
  transition:all 0.2s;
}
.opt-btn:hover:not(.locked) .opt-letter { background:var(--grade); color:white; }
.opt-btn.correct { border-color:var(--green); background:#ECFDF5; }
.opt-btn.correct .opt-letter { background:var(--green); color:white; }
.opt-btn.wrong { border-color:var(--red); background:#FEF2F2; }
.opt-btn.wrong .opt-letter { background:var(--red); color:white; }
.opt-btn.dimmed { opacity:0.4; }

/* Feedback */
.feedback {
  margin-top:16px; padding:14px 18px; border-radius:12px;
  font-size:0.88rem; line-height:1.6;
  animation:fadeIn 0.3s ease;
}
.feedback.correct { background:#ECFDF5; border-left:4px solid var(--green); color:#065F46; }
.feedback.wrong { background:#FEF2F2; border-left:4px solid var(--red); color:#991B1B; }
.feedback strong { display:block; margin-bottom:2px; }

/* Next button */
.next-btn {
  display:inline-flex; align-items:center; gap:8px;
  margin-top:16px; padding:12px 28px; border-radius:12px;
  background:var(--navy); color:var(--gold); border:none;
  font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600;
  cursor:pointer; transition:all 0.25s;
  box-shadow:0 2px 8px rgba(27,42,74,0.15);
}
.next-btn:hover { background:#243660; transform:translateY(-2px); box-shadow:0 4px 16px rgba(27,42,74,0.25); }

/* Summary */
.summary {
  background:var(--white); border-radius:20px; padding:36px;
  border:2px solid var(--grade); text-align:center;
  box-shadow:0 4px 20px rgba(27,42,74,0.08);
  animation:fadeIn 0.5s ease;
}
.summary-emoji { font-size:3.5rem; margin-bottom:12px; }
.summary h2 { font-family:'Fraunces',serif; font-size:1.6rem; font-weight:700; color:var(--navy); margin-bottom:6px; }
.summary .score-big { font-family:'Fraunces',serif; font-size:2.5rem; font-weight:700; color:var(--grade); margin-bottom:8px; }
.summary p { color:var(--gray-600); font-size:0.94rem; line-height:1.7; margin-bottom:16px; }
.retry-btn {
  padding:14px 32px; border-radius:12px;
  background:var(--navy); color:var(--gold); border:none;
  font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600;
  cursor:pointer; transition:all 0.2s;
}
.retry-btn:hover { background:#243660; }

@media (max-width:600px) {
  body { padding:12px; }
  .q-card { padding:20px; }
  .q-text { font-size:1rem; }
  .opt-btn { padding:12px 14px; font-size:0.88rem; }
  .summary { padding:24px; }
}
</style>
</head>
<body>
<div class="game-wrap">
  <div class="game-header">
    <div class="game-title">🌿 Grade 8 Ecology Review</div>
    <div class="game-subtitle">Test your knowledge — pick the best answer</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    <div class="progress-text">
      <span id="pText">Question 1 of 15</span>
      <span class="score-display"><span class="correct" id="sCorrect">0</span> ✓ &nbsp; <span class="wrong" id="sWrong">0</span> ✗</span>
    </div>
  </div>
  <div id="gameArea"></div>
</div>
<script>
var Q = [{"question": "What is an ecosystem?", "options": ["Just the animals in an area", "Just the plants and animals", "Living organisms interacting with each other AND their non-living environment", "A type of habitat"], "answer": "Living organisms interacting with each other AND their non-living environment", "explain": "An ecosystem includes both biotic (living) and abiotic (non-living) components interacting together."}, {"question": "Which of these is an ABIOTIC factor?", "options": ["Trees", "Bacteria", "Temperature", "Fungi"], "answer": "Temperature", "explain": "Abiotic = non-living. Temperature, water, sunlight, and soil are all abiotic factors."}, {"question": "What is the difference between habitat and niche?", "options": ["They mean the same thing", "Habitat is where it lives; niche is its role", "Habitat is bigger than niche", "Niche is where it lives; habitat is its role"], "answer": "Habitat is where it lives; niche is its role", "explain": "Habitat = address (forest, pond). Niche = job (what it eats, when it's active, how it behaves)."}, {"question": "In a food chain, arrows point in the direction of:", "options": ["Who eats whom", "Energy flow", "Movement", "Growth"], "answer": "Energy flow", "explain": "Arrows show the direction energy flows \u2014 from prey to predator (the thing being eaten \u2192 the thing eating it)."}, {"question": "What is a producer?", "options": ["An animal that hunts", "An organism that makes its own food", "A decomposer", "A secondary consumer"], "answer": "An organism that makes its own food", "explain": "Producers (plants, algae) use photosynthesis to convert sunlight into food. They're always at the base of food chains."}, {"question": "The 10% rule states that:", "options": ["10% of species go extinct each year", "Only 10% of energy passes to the next trophic level", "Ecosystems lose 10% of their water", "Plants use 10% of sunlight"], "answer": "Only 10% of energy passes to the next trophic level", "explain": "~90% of energy is lost as heat through respiration at each level. Only ~10% is passed on."}, {"question": "Why do food chains rarely have more than 4-5 levels?", "options": ["There aren't enough species", "Not enough energy remains after 4-5 transfers", "The animals get too big", "Scientists stop counting"], "answer": "Not enough energy remains after 4-5 transfers", "explain": "With only 10% passed on each time, there's not enough energy to support organisms beyond 4-5 levels."}, {"question": "If producers capture 10,000 kJ, how much reaches the secondary consumer?", "options": ["1,000 kJ", "100 kJ", "10 kJ", "5,000 kJ"], "answer": "100 kJ", "explain": "10,000 \u2192 1,000 (primary consumer, 10%) \u2192 100 (secondary consumer, 10%). Apply the 10% rule twice."}, {"question": "What is mutualism?", "options": ["One benefits, other is harmed", "Both benefit", "One benefits, other unaffected", "Both are harmed"], "answer": "Both benefit", "explain": "Mutualism = win-win. Example: bees get nectar (food), flowers get pollinated (reproduction)."}, {"question": "What is parasitism?", "options": ["Both benefit", "One benefits at the other's expense", "Both are harmed", "Neither is affected"], "answer": "One benefits at the other's expense", "explain": "The parasite benefits while the host is harmed. Example: tapeworm living inside an animal."}, {"question": "What is a trophic cascade?", "options": ["A type of waterfall", "A chain reaction through a food web when a species is added or removed", "A disease that spreads through an ecosystem", "Energy loss between levels"], "answer": "A chain reaction through a food web when a species is added or removed", "explain": "Removing or adding one species creates ripple effects through the entire food web. Example: wolves in Yellowstone."}, {"question": "What happened when wolves were reintroduced to Yellowstone?", "options": ["Elk increased", "Trees and vegetation recovered", "Rivers got wider", "Nothing changed"], "answer": "Trees and vegetation recovered", "explain": "Wolves reduced elk \u2192 less overgrazing \u2192 trees grew back \u2192 riverbanks stabilised \u2192 biodiversity increased."}, {"question": "What is biodiversity?", "options": ["The number of plants only", "The total weight of organisms", "The variety of different species in an ecosystem", "How fast organisms reproduce"], "answer": "The variety of different species in an ecosystem", "explain": "Higher biodiversity = more species = healthier, more resilient ecosystem."}, {"question": "What is the role of decomposers?", "options": ["Produce food from sunlight", "Hunt other animals", "Break down dead material and recycle nutrients", "Create new species"], "answer": "Break down dead material and recycle nutrients", "explain": "Decomposers (fungi, bacteria) break down dead organisms and return nutrients to the soil for producers to use."}, {"question": "An invasive species is:", "options": ["Any new baby animal", "A species native to the area", "A non-native organism that damages the ecosystem", "A species that is endangered"], "answer": "A non-native organism that damages the ecosystem", "explain": "Invasive species outcompete native organisms for resources, often with no natural predators to control them."}];
var idx=0, score=0, wrong=0, total=Q.length;

function shuffle(a) { for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
Q = shuffle(Q);

function render() {
  if(idx >= total) { showSummary(); return; }
  var q = Q[idx];
  var opts = shuffle([...q.options]);
  var letters = ['A','B','C','D'];
  var h = '<div class="q-card"><div class="q-num">Question '+(idx+1)+' of '+total+'</div>';
  h += '<div class="q-text">'+q.question+'</div><div class="options">';
  opts.forEach(function(o,i) {
    h += '<button class="opt-btn" data-val="'+o.replace(/"/g,'&quot;')+'" onclick="pick(this)">';
    h += '<span class="opt-letter">'+letters[i]+'</span><span>'+o+'</span></button>';
  });
  h += '</div><div id="fb"></div></div>';
  document.getElementById('gameArea').innerHTML = h;
  document.getElementById('pFill').style.width = Math.round((idx/total)*100)+'%';
  document.getElementById('pText').textContent = 'Question '+(idx+1)+' of '+total;
}

function pick(btn) {
  if(btn.classList.contains('locked')) return;
  var btns = document.querySelectorAll('.opt-btn');
  btns.forEach(function(b){ b.classList.add('locked'); });
  
  var val = btn.dataset.val;
  var q = Q[idx];
  var isCorrect = (val === q.answer);
  
  btns.forEach(function(b) {
    if(b.dataset.val === q.answer) b.classList.add('correct');
    else if(b === btn && !isCorrect) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  
  if(isCorrect) { score++; document.getElementById('sCorrect').textContent = score; }
  else { wrong++; document.getElementById('sWrong').textContent = wrong; }
  
  var fb = document.getElementById('fb');
  fb.innerHTML = '<div class="feedback '+(isCorrect?'correct':'wrong')+'">' +
    '<strong>'+(isCorrect?'✅ Correct!':'❌ Not quite')+'</strong>' +
    q.explain + '</div>' +
    '<button class="next-btn" onclick="next()">'+(idx<total-1?'Next Question →':'See Results →')+'</button>';
}

function next() { idx++; render(); }

function showSummary() {
  var pct = Math.round((score/total)*100);
  var emoji = pct>=90?'🌟':pct>=70?'🎉':pct>=50?'💪':'📚';
  var msg = pct>=90?'Outstanding! You really know this material.':
            pct>=70?'Great work! Review the ones you missed.':
            pct>=50?'Good start — keep practising the tricky ones.':
            'Time to revise! Use the glossary and worksheets, then try again.';
  document.getElementById('pFill').style.width = '100%';
  document.getElementById('pText').textContent = 'Complete!';
  document.getElementById('gameArea').innerHTML =
    '<div class="summary"><div class="summary-emoji">'+emoji+'</div>' +
    '<h2>Quiz Complete!</h2>' +
    '<div class="score-big">'+score+' / '+total+'</div>' +
    '<p>'+pct+'% correct. '+msg+'</p>' +
    '<button class="retry-btn" onclick="retry()">↻ Play Again</button></div>';
}

function retry() { idx=0; score=0; wrong=0; Q=shuffle(Q);
  document.getElementById('sCorrect').textContent='0';
  document.getElementById('sWrong').textContent='0';
  render();
}

render();
</script>
</body>
</html>
