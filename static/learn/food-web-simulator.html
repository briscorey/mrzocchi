<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Food Web Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a1628;color:#e8f4f2;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-size:1.3em;color:#34d399;margin-bottom:2px}
.sub{color:#64748b;font-size:.82em;margin-bottom:10px;text-align:center}
.container{max-width:520px;width:100%}
canvas{border-radius:12px;background:#0f1f38;border:2px solid #1e3a5f;display:block;margin:0 auto;cursor:pointer}
.controls{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.btn{padding:5px 12px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#cbd5e1;cursor:pointer;font-size:.8em}
.btn:hover{border-color:#34d399;color:#34d399}.btn.danger{border-color:#ef4444;color:#ef4444}
.btn.danger:hover{background:#ef4444;color:#fff}
.info{background:#1e293b;border-radius:10px;padding:12px;font-size:.82em;line-height:1.5;color:#94a3b8;margin-top:8px}
.info b{color:#34d399}
.impact{color:#f97316;font-weight:600}
.legend{display:flex;gap:12px;justify-content:center;margin:8px 0;flex-wrap:wrap;font-size:.75em}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
</style></head><body>
<h1>🕸️ Food Web Simulator</h1>
<p class="sub">Click an organism to remove it. Watch the cascade ripple through the ecosystem.</p>
<div class="container">
<canvas id="c" width="500" height="360"></canvas>
<div class="legend">
  <span><span class="dot" style="background:#22c55e"></span> Producer</span>
  <span><span class="dot" style="background:#3b82f6"></span> Primary</span>
  <span><span class="dot" style="background:#f59e0b"></span> Secondary</span>
  <span><span class="dot" style="background:#ef4444"></span> Top Predator</span>
</div>
<div class="controls">
  <button class="btn" onclick="reset()">🔄 Reset Ecosystem</button>
  <button class="btn danger" onclick="removeRandom()">💀 Random Extinction</button>
  <button class="btn" onclick="setScene('yangtze')">🐟 Yangtze River</button>
  <button class="btn" onclick="setScene('forest')">🌲 Korean Forest</button>
  <button class="btn" onclick="setScene('lake')">🌿 Xuanwu Lake</button>
</div>
<div class="info" id="info"><b>Click any organism</b> to remove it and see how the food web changes. Arrows show energy flow (who eats whom).</div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width,H=c.height;
const scenes={
  yangtze:{name:'Yangtze River',organisms:[
    {name:'Algae',emoji:'🌿',x:80,y:300,level:0,alive:true},
    {name:'River Plants',emoji:'🌱',x:250,y:300,level:0,alive:true},
    {name:'Phytoplankton',emoji:'🦠',x:420,y:300,level:0,alive:true},
    {name:'Small Fish',emoji:'🐟',x:100,y:200,level:1,alive:true},
    {name:'Crayfish',emoji:'🦐',x:300,y:200,level:1,alive:true},
    {name:'Snail',emoji:'🐌',x:420,y:210,level:1,alive:true},
    {name:'Carp',emoji:'🐠',x:150,y:110,level:2,alive:true},
    {name:'Catfish',emoji:'🐡',x:350,y:110,level:2,alive:true},
    {name:'Heron',emoji:'🦅',x:250,y:30,level:3,alive:true},
  ],links:[[0,3],[1,3],[1,4],[2,5],[2,3],[3,6],[4,6],[4,7],[5,7],[6,8],[7,8]]},
  forest:{name:'Korean Forest',organisms:[
    {name:'Oak Tree',emoji:'🌳',x:80,y:300,level:0,alive:true},
    {name:'Grass',emoji:'🌾',x:250,y:300,level:0,alive:true},
    {name:'Berries',emoji:'🫐',x:420,y:300,level:0,alive:true},
    {name:'Deer',emoji:'🦌',x:100,y:200,level:1,alive:true},
    {name:'Squirrel',emoji:'🐿️',x:300,y:200,level:1,alive:true},
    {name:'Rabbit',emoji:'🐇',x:420,y:210,level:1,alive:true},
    {name:'Fox',emoji:'🦊',x:150,y:110,level:2,alive:true},
    {name:'Hawk',emoji:'🦅',x:350,y:110,level:2,alive:true},
    {name:'Tiger',emoji:'🐯',x:250,y:30,level:3,alive:true},
  ],links:[[0,3],[0,4],[1,3],[1,5],[2,4],[2,5],[3,6],[3,8],[4,7],[5,6],[5,7],[6,8]]},
  lake:{name:'Xuanwu Lake, Nanjing',organisms:[
    {name:'Lotus',emoji:'🪷',x:80,y:300,level:0,alive:true},
    {name:'Algae',emoji:'🌿',x:250,y:300,level:0,alive:true},
    {name:'Duckweed',emoji:'🍀',x:420,y:300,level:0,alive:true},
    {name:'Tadpole',emoji:'🐸',x:100,y:200,level:1,alive:true},
    {name:'Carp',emoji:'🐟',x:300,y:200,level:1,alive:true},
    {name:'Dragonfly',emoji:'🪰',x:420,y:210,level:1,alive:true},
    {name:'Turtle',emoji:'🐢',x:150,y:110,level:2,alive:true},
    {name:'Crane',emoji:'🦩',x:350,y:110,level:2,alive:true},
    {name:'Heron',emoji:'🦅',x:250,y:30,level:3,alive:true},
  ],links:[[0,3],[1,3],[1,4],[2,4],[2,5],[3,6],[3,7],[4,6],[4,8],[5,7],[5,8],[6,8]]},
};
let scene='yangtze',removed=[];
const colors=['#22c55e','#3b82f6','#f59e0b','#ef4444'];

function getScene(){return JSON.parse(JSON.stringify(scenes[scene]))}
let data=getScene();

function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0f1f38';ctx.fillRect(0,0,W,H);
  // Draw links
  data.links.forEach(([a,b])=>{
    const oa=data.organisms[a],ob=data.organisms[b];
    if(!oa.alive||!ob.alive){ctx.strokeStyle='#1e293b44';ctx.setLineDash([4,4])}
    else{ctx.strokeStyle='#334155';ctx.setLineDash([])}
    ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(oa.x,oa.y);ctx.lineTo(ob.x,ob.y);ctx.stroke();
    // Arrow
    if(oa.alive&&ob.alive){
      const dx=ob.x-oa.x,dy=ob.y-oa.y,d=Math.sqrt(dx*dx+dy*dy);
      const mx=oa.x+dx*.5,my=oa.y+dy*.5;
      const ax=dx/d*8,ay=dy/d*8;
      ctx.fillStyle='#4b5563';ctx.beginPath();
      ctx.moveTo(mx+ax,my+ay);ctx.lineTo(mx-ay*.5-ax*.3,my+ax*.5-ay*.3);ctx.lineTo(mx+ay*.5-ax*.3,my-ax*.5-ay*.3);ctx.fill();
    }
  });
  ctx.setLineDash([]);
  // Draw organisms
  data.organisms.forEach((o,i)=>{
    const col=colors[o.level];
    ctx.globalAlpha=o.alive?.9:.2;
    // Circle
    ctx.fillStyle=o.alive?col+'30':'#33415530';
    ctx.beginPath();ctx.arc(o.x,o.y,24,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=o.alive?col:'#334155';ctx.lineWidth=2;ctx.stroke();
    // Emoji
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.fillText(o.emoji,o.x,o.y-2);
    // Name
    ctx.font='bold 9px "Segoe UI",sans-serif';ctx.fillStyle=o.alive?'#cbd5e1':'#475569';
    ctx.fillText(o.name,o.x,o.y+20);
    if(!o.alive){ctx.font='bold 14px sans-serif';ctx.fillStyle='#ef4444';ctx.fillText('✕',o.x+18,o.y-14)}
    ctx.globalAlpha=1;
  });
  // Scene name
  ctx.font='bold 11px sans-serif';ctx.fillStyle='#475569';ctx.textAlign='left';
  ctx.fillText('🌍 '+data.name,10,H-8);
}

function cascade(idx){
  const o=data.organisms[idx];o.alive=false;removed.push(o.name);
  // Find organisms that ONLY eat this one
  data.organisms.forEach((org,i)=>{
    if(!org.alive||i===idx)return;
    // Check if org eats the removed one
    const foodSources=data.links.filter(([a,b])=>b===i&&data.organisms[a].alive);
    if(foodSources.length===0&&org.level>0){
      // This organism has no food left — it starves
      setTimeout(()=>{cascade(i);draw();updateInfo()},600);
    }
  });
}

function updateInfo(){
  const alive=data.organisms.filter(o=>o.alive);
  const dead=data.organisms.filter(o=>!o.alive);
  if(dead.length===0){
    document.getElementById('info').innerHTML='<b>Healthy ecosystem.</b> Click any organism to remove it and observe the trophic cascade.';
  }else{
    const effects=[];
    // Check for population explosions (prey with no predators)
    alive.forEach(o=>{
      const predators=data.links.filter(([a,b])=>a===data.organisms.indexOf(o)&&data.organisms[b].alive);
      if(predators.length===0&&o.level>0) effects.push(`<span class="impact">📈 ${o.name}</span> population may explode (no predators left)`);
      if(predators.length===0&&o.level===0){
        const grazers=data.links.filter(([a,b])=>a===data.organisms.indexOf(o)&&data.organisms[b].alive);
        // producers with no consumers
      }
    });
    // Check for starvation risk
    alive.forEach((o,i)=>{
      const idx=data.organisms.indexOf(o);
      const food=data.links.filter(([a,b])=>b===idx&&data.organisms[a].alive);
      if(food.length===1&&o.level>0) effects.push(`<span class="impact">⚠️ ${o.name}</span> has only 1 food source left — vulnerable`);
    });
    document.getElementById('info').innerHTML=`<b>Removed:</b> ${dead.map(d=>d.emoji+' '+d.name).join(', ')}<br><br>${effects.length?effects.join('<br>'):'<b>Cascade in progress...</b> Watch for organisms losing all food sources.'}`;
  }
}

c.onclick=e=>{
  const rect=c.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  data.organisms.forEach((o,i)=>{
    if(!o.alive)return;
    const dx=o.x-mx,dy=o.y-my;
    if(dx*dx+dy*dy<24*24){cascade(i);draw();updateInfo()}
  });
};

function reset(){data=getScene();removed=[];draw();updateInfo()}
function removeRandom(){const alive=data.organisms.filter(o=>o.alive);if(alive.length>1){const r=alive[Math.floor(Math.random()*alive.length)];cascade(data.organisms.indexOf(r));draw();updateInfo()}}
function setScene(s){scene=s;reset()}
draw();updateInfo();
</script></body></html>
