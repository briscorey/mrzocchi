baseURL = "https://mrzocchi.com/"
languageCode = "en"
title = "Mr Zocchi | Maths & Science"

[params]
  description = "Mr Zocchi's MYP Mathematics and Science class website — PowerPoints, worksheets, revision games, vocabulary glossary, interactive simulations, and self-quiz for Grade 6, 7, and 8 at Nanjing International School."
  author = "Corey Zocchi"
  ogImage = "images/og-image.png"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepEndTags = false
      keepWhitespace = false
    [minify.tdewolff.css]
      keepCSS2 = true
    [minify.tdewolff.js]
      keepVarNames = false
