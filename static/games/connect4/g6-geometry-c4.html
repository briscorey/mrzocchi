<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Join Dots — G6 Geometry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}

/* Difficulty screen */
.diff-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.diff-screen h1{font-size:2.4rem;font-weight:800;margin-bottom:4px;letter-spacing:-0.04em}
.diff-screen h1 span{background:linear-gradient(135deg,#2dd4bf,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.diff-sub{color:#64748b;margin-bottom:32px;font-size:0.95rem}
.diff-label{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#64748b;margin-bottom:14px}
.diff-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}
.diff-btn{padding:16px 24px;border-radius:14px;border:2px solid #1e293b;background:#1e293b;color:#e2e8f0;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px}
.diff-btn:hover{border-color:#2dd4bf;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.diff-btn small{color:#64748b;font-weight:400;font-size:0.8rem;display:block;margin-top:2px}
.diff-icon{font-size:1.4rem;width:40px;text-align:center;flex-shrink:0}

/* Game layout */
.game{display:none;padding:16px}
.game.show{display:block}
.game-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;max-width:1100px;margin:0 auto}
.game-header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 0 8px}
.game-title{font-size:1.1rem;font-weight:700}
.game-title span{color:#2dd4bf}
.back-btn{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-family:inherit;font-size:0.78rem;cursor:pointer;transition:all .2s}
.back-btn:hover{border-color:#2dd4bf;color:#e2e8f0}

/* Board area */
.board-col{display:flex;flex-direction:column;align-items:center;gap:10px}
.status{font-size:0.95rem;font-weight:600;height:32px;display:flex;align-items:center;gap:8px}
.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.board-container{position:relative;width:100%;max-width:490px}
.board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:linear-gradient(160deg,#1d4ed8,#2563eb,#1e40af);border-radius:16px;padding:10px}
.cell{aspect-ratio:1;border-radius:50%;background:#0f172a;border:3px solid rgba(0,0,0,0.35);transition:background .15s}
.cell:hover{background:#1e293b;border-color:rgba(255,255,255,0.15)}
.cell.r{background:#ef4444;border-color:#b91c1c;box-shadow:inset 0 -4px 8px rgba(0,0,0,0.25),0 0 20px rgba(239,68,68,0.35)}
.cell.y{background:#facc15;border-color:#ca8a04;box-shadow:inset 0 -4px 8px rgba(0,0,0,0.15),0 0 20px rgba(250,204,21,0.35)}
.cell.w{animation:wp .5s ease infinite alternate}
@keyframes wp{to{transform:scale(1.1);filter:brightness(1.4)}}
.cell.drop{animation:fd .35s cubic-bezier(.22,1.3,.36,1)}
@keyframes fd{0%{transform:translateY(-500%);opacity:0}70%{transform:translateY(8%)}100%{transform:translateY(0);opacity:1}}
.scores{display:flex;gap:20px;font-size:0.82rem}
.scores span{display:flex;align-items:center;gap:6px}

/* Right panel */
.panel{display:flex;flex-direction:column;gap:14px}
.score-bar{display:flex;justify-content:space-around;padding:14px;background:#1e293b;border-radius:14px;border:1px solid #334155}
.sc-item{text-align:center}
.sc-item strong{font-size:1.5rem;display:block}
.sc-item small{font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:0.06em}
.sc-item.rc strong{color:#ef4444}.sc-item.yc strong{color:#facc15}

/* Question card */
.q-box{background:#1e293b;border-radius:14px;border:1px solid #334155;padding:20px;flex:1;display:flex;flex-direction:column}
.q-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;width:fit-content}
.q-badge.rb{background:rgba(239,68,68,0.12);color:#ef4444}
.q-badge.yb{background:rgba(250,204,21,0.12);color:#eab308}
.q-text{font-size:0.98rem;font-weight:600;line-height:1.6;margin-bottom:16px}
.q-opts{display:flex;flex-direction:column;gap:7px}
.q-opt{padding:11px 14px;border-radius:10px;border:1.5px solid #334155;background:transparent;color:#e2e8f0;font-family:inherit;font-size:0.85rem;cursor:pointer;text-align:left;transition:all .2s;line-height:1.4}
.q-opt:hover{border-color:#2dd4bf;background:rgba(45,212,191,0.04)}
.q-opt.ok{border-color:#10b981;background:rgba(16,185,129,0.1);color:#10b981;pointer-events:none}
.q-opt.no{border-color:#ef4444;background:rgba(239,68,68,0.06);color:#ef4444;pointer-events:none}
.q-opt.dis{pointer-events:none;opacity:0.5}
.q-opt.ok.dis,.q-opt.no.dis{opacity:1}
.q-why{margin-top:10px;padding:10px 12px;border-radius:8px;background:rgba(45,212,191,0.06);border-left:3px solid #2dd4bf;font-size:0.8rem;color:#94a3b8;line-height:1.5;display:none}
.q-go{margin-top:12px;padding:10px;border-radius:10px;border:none;background:#2dd4bf;color:#0f172a;font-family:inherit;font-size:0.88rem;font-weight:700;cursor:pointer;display:none;width:100%;transition:background .2s}
.q-go:hover{background:#5eead4}
.q-wait{padding:20px;text-align:center;color:#64748b;font-size:0.9rem}
.q-wait em{color:#94a3b8;font-style:normal}

/* Win banner */
.win-card{background:#1e293b;border-radius:14px;border:1px solid #334155;padding:28px;text-align:center;display:none}
.win-card.show{display:block}
.win-em{font-size:3rem;margin-bottom:6px}
.win-t{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.win-s{color:#64748b;font-size:0.88rem;margin-bottom:16px}
.win-btn{padding:10px 28px;border-radius:10px;border:1.5px solid #334155;background:#1e293b;color:#e2e8f0;font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all .2s}
.win-btn:hover{border-color:#2dd4bf;color:#2dd4bf}

/* Responsive — stack on narrow */
@media(max-width:800px){
  .game-layout{grid-template-columns:1fr;max-width:500px}
  .board-container{max-width:100%}
  .panel{order:-1}
  .score-bar{padding:10px}
}
</style>
</head>
<body>

<div class="diff-screen" id="diffScreen">
  <h1>Join Dots &mdash; <span>G6 Geometry</span></h1>
  <p class="diff-sub">Connect 4 meets quiz &mdash; answer to play!</p>
  <div class="diff-label">Choose difficulty</div>
  <div class="diff-btns">
    <button class="diff-btn" onclick="go('easy')"><span class="diff-icon">&#x1F7E2;</span><div><strong>Easy</strong><small>AI sometimes makes mistakes</small></div></button>
    <button class="diff-btn" onclick="go('medium')"><span class="diff-icon">&#x1F7E1;</span><div><strong>Medium</strong><small>Plays well, blocks your wins</small></div></button>
    <button class="diff-btn" onclick="go('hard')"><span class="diff-icon">&#x1F534;</span><div><strong>Hard</strong><small>Strategic and ruthless</small></div></button>
    <button class="diff-btn" onclick="go('1v1')"><span class="diff-icon">&#x1F465;</span><div><strong>1 v 1</strong><small>Play against a friend</small></div></button>
  </div>
</div>

<div class="game" id="game">
  <div class="game-layout">
    <div class="game-header">
      <div class="game-title">Join Dots &mdash; <span>G6 Geometry</span></div>
      <button class="back-btn" onclick="location.reload()">&#x2190; Change mode</button>
    </div>
    <div class="board-col">
      <div class="status" id="st"><div class="dot" id="stDot" style="background:#ef4444"></div><span id="stTxt">Your turn &mdash; click a column!</span></div>
      <div class="board-container">
        
        <div class="board" id="bd"></div>
      </div>
      <div class="scores"><span><div class="dot" style="background:#ef4444"></div><span id="lb1">You</span>: <b id="v1">0</b></span><span><div class="dot" style="background:#facc15"></div><span id="lb2">AI</span>: <b id="v2">0</b></span></div>
    </div>
    <div class="panel">
      <div class="score-bar"><div class="sc-item rc"><strong id="sv1">0</strong><small id="sl1">You</small></div><div class="sc-item"><strong id="svd">0</strong><small>Draws</small></div><div class="sc-item yc"><strong id="sv2">0</strong><small id="sl2">AI</small></div></div>
      <div class="q-box" id="qBox"><div class="q-wait" id="qWait"><em>Click a column</em> to start playing!<br>Answer correctly to drop your piece.</div></div>
      <div class="win-card" id="winCard"><div class="win-em" id="winEm"></div><div class="win-t" id="winT"></div><div class="win-s" id="winS"></div><button class="win-btn" onclick="newG()">Play Again</button></div>
    </div>
  </div>
</div>

<script>
var Q = [{"question": "What is perimeter?", "options": ["The space inside a shape", "The distance around the outside of a shape", "The number of sides", "The height of a shape"], "answer": "The distance around the outside of a shape", "explain": "Perimeter = total distance around the outside. Add up all the side lengths."}, {"question": "The formula for the circumference of a circle is:", "options": ["C = πr", "C = 2πr", "C = πr²", "C = 2r"], "answer": "C = 2πr", "explain": "Circumference = 2 × π × radius. You can also use C = πd (π × diameter)."}, {"question": "What is the area of a triangle with base 10 cm and height 6 cm?", "options": ["60 cm²", "30 cm²", "16 cm²", "20 cm²"], "answer": "30 cm²", "explain": "A = ½ × base × height = ½ × 10 × 6 = 30 cm²"}, {"question": "Why must you use the PERPENDICULAR height in area formulas?", "options": ["It's the longest measurement", "It's at 90° to the base — the true vertical distance", "It's easier to measure", "It gives a bigger answer"], "answer": "It's at 90° to the base — the true vertical distance", "explain": "The perpendicular height is the shortest distance from base to top. Using the slant height gives an incorrect, larger answer."}, {"question": "What units are used to measure area?", "options": ["cm, m", "cm², m²", "cm³, m³", "kg, g"], "answer": "cm², m²", "explain": "Area is measured in SQUARED units because you're measuring 2-dimensional space."}, {"question": "What is the formula for the area of a circle?", "options": ["A = πd", "A = 2πr", "A = πr²", "A = πr"], "answer": "A = πr²", "explain": "Area of a circle = π × radius². Remember to square the radius first, then multiply by π."}, {"question": "What is surface area?", "options": ["The area of the base", "The total area of all faces of a 3D shape", "The volume of a shape", "The perimeter of a 3D shape"], "answer": "The total area of all faces of a 3D shape", "explain": "Imagine unfolding a box into a flat net — the total area of all those faces is the surface area."}, {"question": "What is the volume of a rectangular prism 5cm × 4cm × 3cm?", "options": ["12 cm³", "60 cm³", "120 cm³", "30 cm³"], "answer": "60 cm³", "explain": "V = length × width × height = 5 × 4 × 3 = 60 cm³"}, {"question": "What units are used to measure volume?", "options": ["cm², m²", "cm, m", "cm³, m³", "mL only"], "answer": "cm³, m³", "explain": "Volume is measured in CUBED units because you're measuring 3-dimensional space."}, {"question": "The golden rule for capacity is:", "options": ["1 cm³ = 10 mL", "1 cm³ = 1 mL", "1 m³ = 1 mL", "1 cm³ = 1 L"], "answer": "1 cm³ = 1 mL", "explain": "This is the most important conversion: 1 cubic centimetre holds exactly 1 millilitre."}, {"question": "How many millilitres in 1 litre?", "options": ["10 mL", "100 mL", "1,000 mL", "10,000 mL"], "answer": "1,000 mL", "explain": "1 L = 1,000 mL. To convert litres to mL, multiply by 1,000."}, {"question": "A fish tank is 40cm × 25cm × 30cm. What is its capacity in litres?", "options": ["30 L", "300 L", "3 L", "95 L"], "answer": "30 L", "explain": "V = 40 × 25 × 30 = 30,000 cm³ = 30,000 mL = 30 L"}, {"question": "What is a prism?", "options": ["A shape with no flat faces", "A 3D shape with the same cross-section along its length", "A type of triangle", "A shape with curved surfaces"], "answer": "A 3D shape with the same cross-section along its length", "explain": "A prism has a uniform cross-section — like slicing a loaf of bread, every slice is the same shape."}, {"question": "A cube has sides of 5 cm. What is its surface area?", "options": ["25 cm²", "125 cm²", "150 cm²", "100 cm²"], "answer": "150 cm²", "explain": "A cube has 6 faces, each 5×5 = 25 cm². Total SA = 6 × 25 = 150 cm²."}];
var R=6,C=7,g,cur,ov,mode,qi,sc,pc,aiB;
function sh(a){for(var i=a.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=a[i];a[i]=a[j];a[j]=t}return a}
function go(m){mode=m;document.getElementById('diffScreen').style.display='none';var gm=document.getElementById('game');gm.classList.add('show');var is1=m==='1v1';document.getElementById('lb1').textContent=document.getElementById('sl1').textContent=is1?'Red':'You';document.getElementById('lb2').textContent=document.getElementById('sl2').textContent=is1?'Yellow':'AI';sc=[0,0,0];newG()}
function newG(){g=[];for(var r=0;r<R;r++){g[r]=[];for(var c=0;c<C;c++)g[r][c]=0}cur=1;ov=false;aiB=false;qi=0;sh(Q);ren();upSt();document.getElementById('winCard').classList.remove('show');document.getElementById('qBox').innerHTML='<div class="q-wait" id="qWait"><em>Click a column</em> to start playing!<br>Answer correctly to drop your piece.</div>'}
function ren(){var h='';for(var r=0;r<R;r++)for(var c=0;c<C;c++){var v=g[r][c];h+='<div class="cell'+(v===1?' r':v===2?' y':'')+'" data-c="'+c+'" onclick="pl('+c+')"></div>'}document.getElementById('bd').innerHTML=h}
function upSt(){if(ov)return;var d=document.getElementById('stDot'),t=document.getElementById('stTxt');d.style.background=cur===1?'#ef4444':'#facc15';if(mode==='1v1'){t.textContent=(cur===1?'Red':'Yellow')+"'s turn"}else{t.textContent=cur===1?'Your turn \u2014 click a column!':'AI thinking...'}}
function upSc(){document.getElementById('sv1').textContent=document.getElementById('v1').textContent=sc[0];document.getElementById('sv2').textContent=document.getElementById('v2').textContent=sc[1];document.getElementById('svd').textContent=sc[2]}
function pl(c){if(ov||aiB||g[0][c])return;if(mode!=='1v1'&&cur===2)return;pc=c;showQ()}
function nxQ(){if(qi>=Q.length){sh(Q);qi=0}return Q[qi++]}
function showQ(){var q=nxQ();var bx=document.getElementById('qBox');var bc=cur===1?'rb':'yb';var lab=mode==='1v1'?(cur===1?'Red':'Yellow')+"'s Question":'Your Question';var opts=sh(q.options.slice());var h='<div class="q-badge '+bc+'">'+lab+'</div><div class="q-text">'+q.question+'</div><div class="q-opts">';for(var i=0;i<opts.length;i++)h+='<button class="q-opt" onclick="ans(this)" data-v="'+opts[i].replace(/"/g,'&quot;')+'">'+opts[i]+'</button>';h+='</div><div class="q-why" id="qWhy">'+(q.explain||'')+'</div><button class="q-go" id="qGo" onclick="doMove()">Continue</button>';bx.innerHTML=h;bx._cor=q.answer;bx._ok=null}
function ans(btn){var bx=document.getElementById('qBox');var cor=bx._cor;var pic=btn.dataset.v;bx.querySelectorAll('.q-opt').forEach(function(b){b.classList.add('dis');if(b.dataset.v===cor)b.classList.add('ok')});if(pic!==cor)btn.classList.add('no');var w=document.getElementById('qWhy');if(w.textContent)w.style.display='block';document.getElementById('qGo').style.display='block';bx._ok=pic===cor}
function doMove(){var bx=document.getElementById('qBox');var ok=bx._ok;if(ok){drop(pc,cur);if(!ov){cur=cur===1?2:1;ren();upSt();if(mode!=='1v1'&&cur===2){aiB=true;bx.innerHTML='<div class="q-wait">AI is thinking...</div>';setTimeout(aiTurn,500)}else{bx.innerHTML='<div class="q-wait"><em>Click a column</em> to play!</div>'}}}else{document.getElementById('stTxt').textContent='Wrong! Turn lost.';cur=cur===1?2:1;setTimeout(function(){ren();upSt();if(mode!=='1v1'&&cur===2){aiB=true;bx.innerHTML='<div class="q-wait">AI is thinking...</div>';setTimeout(aiTurn,500)}else{bx.innerHTML='<div class="q-wait"><em>Click a column</em> to play!</div>'}},900)}}
function drop(c,p){var row=-1;for(var i=R-1;i>=0;i--)if(!g[i][c]){g[i][c]=p;row=i;break}ren();if(row>=0){var cells=document.querySelectorAll('.cell');cells[row*C+c].classList.add('drop')}if(hw(g,p)){ov=true;sc[p-1]++;upSc();hlW(p);setTimeout(function(){showWin(p)},600)}else if(g[0].every(function(v){return v})){ov=true;sc[2]++;upSc();setTimeout(showDraw,400)}}
function aiTurn(){var c=aiPk();drop(c,2);aiB=false;if(!ov){cur=1;ren();upSt();document.getElementById('qBox').innerHTML='<div class="q-wait"><em>Click a column</em> to play!</div>'}}
function aiPk(){var v=vc();for(var i=0;i<v.length;i++)if(ww(v[i],2))return v[i];for(var i=0;i<v.length;i++)if(ww(v[i],1))return v[i];if(mode==='easy')return v[0|Math.random()*v.length];if(mode==='medium'){var p=[3,2,4,1,5,0,6];for(var i=0;i<p.length;i++)if(v.indexOf(p[i])>=0)return p[i];return v[0]}var best=-1e9,bc=v[0];for(var i=0;i<v.length;i++){var ng=cg();sd(ng,v[i],2);var s=mm(ng,4,false,-1e9,1e9);if(s>best){best=s;bc=v[i]}}return bc}
function vc(){var v=[];for(var c=0;c<C;c++)if(!g[0][c])v.push(c);return v}
function ww(c,p){var ng=cg();sd(ng,c,p);return hw(ng,p)}
function cg(){return g.map(function(r){return r.slice()})}
function sd(b,c,p){for(var i=R-1;i>=0;i--)if(!b[i][c]){b[i][c]=p;return}}
function mm(b,d,mx,a,bt){if(hw(b,2))return 100+d;if(hw(b,1))return-100-d;if(!d)return ev(b);var v=[];for(var c=0;c<C;c++)if(!b[0][c])v.push(c);if(!v.length)return 0;if(mx){var best=-1e9;for(var i=0;i<v.length;i++){var n=b.map(function(r){return r.slice()});sd(n,v[i],2);best=Math.max(best,mm(n,d-1,false,a,bt));a=Math.max(a,best);if(bt<=a)break}return best}else{var best=1e9;for(var i=0;i<v.length;i++){var n=b.map(function(r){return r.slice()});sd(n,v[i],1);best=Math.min(best,mm(n,d-1,true,a,bt));bt=Math.min(bt,best);if(bt<=a)break}return best}}
function ev(b){var s=0;for(var r=0;r<R;r++){if(b[r][3]===2)s+=3;if(b[r][3]===1)s-=3}return s}
function hw(b,p){for(var r=0;r<R;r++)for(var c=0;c<C;c++){if(c+3<C&&b[r][c]===p&&b[r][c+1]===p&&b[r][c+2]===p&&b[r][c+3]===p)return true;if(r+3<R&&b[r][c]===p&&b[r+1][c]===p&&b[r+2][c]===p&&b[r+3][c]===p)return true;if(r+3<R&&c+3<C&&b[r][c]===p&&b[r+1][c+1]===p&&b[r+2][c+2]===p&&b[r+3][c+3]===p)return true;if(r+3<R&&c-3>=0&&b[r][c]===p&&b[r+1][c-1]===p&&b[r+2][c-2]===p&&b[r+3][c-3]===p)return true}return false}
function hlW(p){var cells=document.querySelectorAll('.cell');for(var r=0;r<R;r++)for(var c=0;c<C;c++){var ds=[[0,1],[1,0],[1,1],[1,-1]];for(var d=0;d<ds.length;d++){var dr=ds[d][0],dc=ds[d][1];if(r+3*dr>=0&&r+3*dr<R&&c+3*dc>=0&&c+3*dc<C){var ok=true;for(var k=0;k<4;k++)if(g[r+k*dr][c+k*dc]!==p){ok=false;break}if(ok)for(var k=0;k<4;k++)cells[(r+k*dr)*C+(c+k*dc)].classList.add('w')}}}}
function showWin(p){var wc=document.getElementById('winCard');wc.classList.add('show');if(mode==='1v1'){document.getElementById('winEm').textContent=p===1?'\uD83D\uDD34':'\uD83D\uDFE1';document.getElementById('winT').textContent=(p===1?'Red':'Yellow')+' Wins!'}else{document.getElementById('winEm').textContent=p===1?'\uD83C\uDF89':'\uD83E\uDD16';document.getElementById('winT').textContent=p===1?'You Win!':'AI Wins!'}document.getElementById('winS').textContent=sc[0]+' \u2013 '+sc[1]+' ('+sc[2]+' draws)'}
function showDraw(){var wc=document.getElementById('winCard');wc.classList.add('show');document.getElementById('winEm').textContent='\uD83E\uDD1D';document.getElementById('winT').textContent="It's a Draw!";document.getElementById('winS').textContent=sc[0]+' \u2013 '+sc[1]+' ('+sc[2]+' draws)'}
</script>
</body>
</html>
